name: Build Parental Control App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace
      
      - name: Build Release APK  
        run: ./gradlew :app:assembleRelease --stacktrace
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ParentalControl-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ParentalControl-Release-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
      
      - name: APK Size
        run: |
          debug_size=$(ls -lh app/build/outputs/apk/debug/app-debug.apk | awk '{print $5}')
          echo "Debug APK Size: $debug_size"
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            release_size=$(ls -lh app/build/outputs/apk/release/app-release.apk | awk '{print $5}')
            echo "Release APK Size: $release_size"
          fi
